name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      # direnv enables the integration script's end-to-end test
      # (it skips gracefully when absent, but CI should run it).
      - run: nix profile install nixpkgs#direnv
      - run: make test
